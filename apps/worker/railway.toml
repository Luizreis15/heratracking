# Railway: New Project → Deploy from GitHub → Root Directory = apps/worker
# Variáveis obrigatórias no dashboard:
#   ANTHROPIC_API_KEY, PERPLEXITY_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Opcionais: PERPLEXITY_MODEL, POLL_INTERVAL_MS, INTEL_AUTO_SCAN_HOURS,
#   HERA_PREMIUM_SUPABASE_URL, HERA_PREMIUM_SERVICE_ROLE_KEY, HERA_PREMIUM_CLIENT_ID

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
